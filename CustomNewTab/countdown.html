<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Year Countdown</title>
  <link rel="stylesheet" href="countdown.css"/>
</head>
<body>
  <div class="grid-background" id="grid"></div>

  <div class="content">
    <h1>Stop wasting time !! <br> It's ticking out of your hand.</h1>
    <button id="label">Another Year will End In </button>
    <div id="countdown">
      <div>00 <span>DAYS</span></div>
      <div>00 <span>HOURS</span></div>
      <div>00 <span>MINUTES</span></div>
      <div>00 <span>SECONDS</span></div>
      <div>000 <span>MS</span></div>
    </div>
    <h1 class="gaali">अबे गधे अब तो उखाड़ ले कुछ ज़िंदगी में..😡 <br> या फिर, बस्स की नहीं है तेरे ? 🤣 </h1>
    <h2>&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;
      &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; 
      &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; 
      &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;~ Future You </h2>
  </div>

  <script src="countdown.js"></script>
</body>
</html>
