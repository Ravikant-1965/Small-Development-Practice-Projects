<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Tic Tac Toe</title>
		<link rel="stylesheet" href="kata.css" />
	</head>
	<body>
		<main>
			<h1>Tic Tac Toe</h1>
			<div class="msg-container hide">
				<p id="msg">Message</p>
			</div>
			<div class="container">
				<div class="game">
					<button class="box" type="button" title="b1"></button>
					<button class="box" type="button" title="b2"></button>
					<button class="box" type="button" title="b3"></button>
					<button class="box" type="button" title="b4"></button>
					<button class="box" type="button" title="b5"></button>
					<button class="box" type="button" title="b6"></button>
					<button class="box" type="button" title="b7"></button>
					<button class="box" type="button" title="b8"></button>
					<button class="box" type="button" title="b9"></button>
				</div>
			</div>
			<button id="reset-btn">Restart</button>
		</main>
		<script src="zeroKata.js"></script>
	</body>
</html>
